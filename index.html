<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> | AI VILE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #000000;
            --sidebar-bg: #0a0a0a;
            --line: rgba(255, 255, 255, 0.12); 
            --input-bg: rgba(255, 255, 255, 0.14); 
            --text: #ffffff;
            --accent: rgba(255, 255, 255, 0.2);
            --box-bg: #111111;
            --modal-bg: #161616;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            height: 100vh; 
            display: flex; 
            overflow: hidden; 
        }

        /* --- SIDEBAR --- */
        aside { 
            width: 280px; 
            background: var(--sidebar-bg);
            border-right: 1px solid var(--line); 
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .top-nav {
            padding: 15px 20px 5px 20px;
            display: flex;
            gap: 10px;
        }

        .sidebar-header {
            padding: 10px 20px 10px 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .nav-btn {
            width: 100%;
            padding: 12px;
            background: var(--input-bg);
            border: 1px solid var(--line);
            border-radius: 10px;
            color: white;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }

        .icon-btn {
            flex: 1;
            justify-content: center;
            padding: 10px;
            font-size: 16px;
        }

        .nav-btn:hover { background: var(--accent); }

        .hanging-label {
            padding: 15px 25px 5px 25px;
            font-size: 11px;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        #history-list {
            flex: 1;
            overflow-y: auto;
            padding: 5px 10px 10px 10px;
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.1) transparent;
        }

        #history-list::-webkit-scrollbar { width: 4px; }
        #history-list::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }

        .history-item {
            padding: 12px;
            margin-bottom: 5px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            color: #aaa;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: background 0.2s, color 0.2s;
        }

        .history-item:hover { background: rgba(255,255,255,0.05); color: #fff; }
        .history-item.active { background: var(--line); color: #fff; }

        .sidebar-footer {
            padding: 15px 20px;
            border-top: 1px solid var(--line);
            margin-top: auto;
        }

        /* --- MAIN AREA --- */
        main { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            height: 100%;
            min-width: 0; 
            position: relative;
        }

        /* Profile Button Top Right */
        .profile-trigger {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: var(--input-bg);
            border: 1px solid var(--line);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 50;
            color: #fff;
            transition: background 0.3s;
        }

        .profile-trigger:hover { background: var(--accent); }

        #chat-container { 
            flex: 1; 
            overflow-y: auto; 
            padding: 80px 40px 40px 40px; 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
        }

        .msg { 
            max-width: 85%; 
            padding: 15px 20px; 
            border: 1px solid var(--line); 
            font-size: 14px;
            line-height: 1.6;
            color: #fff;
            border-radius: 10px; 
        }

        .user { align-self: flex-end; border-color: rgba(255, 255, 255, 0.4); }
        .ai { align-self: flex-start; }

        /* --- MODALS & POLLS --- */
        .modal-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(8px);
        }

        .modal-overlay.show { display: flex; }

        .central-poll {
            background: var(--modal-bg);
            width: 90%;
            max-width: 420px;
            border-radius: 24px;
            border: 1px solid var(--line);
            padding: 40px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        .modal-input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            background: #000;
            border: 1px solid var(--line);
            border-radius: 10px;
            color: white;
            outline: none;
            font-size: 14px;
        }

        .modal-btn {
            width: 100%;
            padding: 14px;
            margin-top: 15px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.2s;
        }

        .modal-btn:hover { opacity: 0.9; }

        .toggle-auth {
            margin-top: 20px;
            font-size: 13px;
            color: #888;
            cursor: pointer;
        }

        .toggle-auth span { color: #fff; text-decoration: underline; }

        /* --- INPUT AREA --- */
        .input-area { 
            padding: 20px; 
            display: flex;
            justify-content: center;
            align-items: flex-end; 
            gap: 10px; 
            position: relative; 
        }

        .action-box {
            position: absolute;
            bottom: 120%; 
            background: var(--box-bg);
            border: 1px solid var(--line);
            border-radius: 12px;
            width: 220px;
            display: none;
            z-index: 100;
            padding: 8px 0;
        }

        .action-box.active { display: block; animation: fadeIn 0.15s ease-out; }

        .poll-item {
            display: flex;
            align-items: center;
            padding: 12px 18px;
            color: #ccc;
            font-size: 14px;
            cursor: pointer;
            gap: 12px;
        }

        .poll-item:hover { background: var(--line); color: #fff; }

        .circle-btn {
            width: 48px; height: 48px;
            background: var(--input-bg);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #ffffff;
            flex-shrink: 0;
            position: relative;
        }

        .circle-btn.recording { background: rgba(255, 0, 0, 0.3); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        .input-wrap { position: relative; width: 100%; max-width: 800px; display: flex; align-items: flex-end; }

        .input-box {
            width: 100%;
            background: var(--input-bg);
            border: none; 
            border-radius: 25px; 
            padding: 15px 50px 15px 20px; 
            color: var(--text);
            outline: none;
            font-size: 16px;
            resize: none;
            max-height: 160px; 
            overflow-y: auto;
        }

        .send-btn {
            position: absolute;
            right: 15px; bottom: 14px; 
            color: #ffffff; font-size: 18px;
            cursor: pointer;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <aside>
        <div class="top-nav">
            <div class="nav-btn icon-btn" onclick="openModal('Search')"><i class="fas fa-search"></i></div>
            <div class="nav-btn icon-btn" onclick="openModal('More Options')"><i class="fas fa-bars"></i></div>
        </div>
        <div class="sidebar-header">
            <div class="nav-btn" onclick="showNamingModal()">
                <i class="fas fa-plus-circle"></i>
                <span>New Chat</span>
            </div>
            <div class="nav-btn" onclick="openModal('World')">
                <i class="fas fa-globe"></i>
                <span>World</span>
            </div>
            <div class="nav-btn" onclick="openModal('More')">
                <i class="fas fa-ellipsis-h"></i>
                <span>...</span>
            </div>
        </div>
        
        <div class="hanging-label">Chats</div>
        <div id="history-list"></div>

        <div class="sidebar-footer">
            <div class="nav-btn" onclick="openModal('Settings')">
                <i class="fas fa-cog"></i>
                <span>Settings</span>
            </div>
        </div>
    </aside>

    <main>
        <div class="profile-trigger" onclick="toggleAuthModal()">
            <i class="fas fa-user"></i>
        </div>

        <div id="authOverlay" class="modal-overlay">
            <div class="central-poll">
                <i class="fas fa-times" style="float:right; cursor:pointer" onclick="toggleAuthModal()"></i>
                <h2 id="authTitle" style="font-size: 20px; margin-bottom: 10px;">Sign In</h2>
                <p id="authSub" style="color: #666; font-size: 13px; margin-bottom: 20px;">Enter your verified account details</p>
                
                <input type="email" class="modal-input" placeholder="Email Address">
                <input type="password" class="modal-input" placeholder="Password">
                <div id="signUpFields" style="display: none;">
                    <input type="text" class="modal-input" placeholder="Full Name">
                </div>
                
                <button class="modal-btn" onclick="toggleAuthModal()">Continue</button>
                
                <div class="toggle-auth" onclick="switchAuthMode()">
                    <p id="authToggleText">New user? <span>Create an account</span></p>
                </div>
            </div>
        </div>

        <div id="namingOverlay" class="modal-overlay">
            <div class="central-poll">
                <h2 style="font-size: 18px;">Name your Chat</h2>
                <input type="text" id="chatNameInput" class="modal-input" placeholder="e.g. My Project" autofocus>
                <button class="modal-btn" onclick="createNewChat()">Create Chat</button>
            </div>
        </div>

        <div id="modalOverlay" class="modal-overlay">
            <div class="central-poll">
                <i class="fas fa-times" style="float:right; cursor:pointer" onclick="closeModal()"></i>
                <h2 id="modalTitle" style="margin-bottom: 20px; font-size: 18px;"></h2>
                <div id="modalBody" style="color: #aaa;"></div>
            </div>
        </div>

        <div id="chat-container"></div>

        <div class="input-area">
            <div id="btn1" class="circle-btn" onclick="toggleBox('box1')">
                <i class="fas fa-plus"></i>
                <div id="box1" class="action-box">
                    <div class="poll-item" onclick="openModal('Attach File')"><i class="fas fa-paperclip"></i> Attach File</div>
                    <div class="poll-item" onclick="openModal('Search Link')"><i class="fas fa-link"></i> Search Link</div>
                    <div class="poll-item" onclick="openModal('Settings')"><i class="fas fa-cog"></i> Settings</div>
                    <div class="poll-item" onclick="openModal('Mode')"><i class="fas fa-layer-group"></i> Mode</div>
                    <div class="poll-item" onclick="openModal('Tools')"><i class="fas fa-tools"></i> Tools</div>
                </div>
            </div>
            
            <div id="btn2" class="circle-btn" onclick="toggleBox('box2')" style="display: none;">
                <i class="fas fa-camera"></i>
                <div id="box2" class="action-box" style="height:150px"></div>
            </div>

            <div id="btn3" class="circle-btn" onclick="startVoiceRecognition('btn3')">
                <i class="fas fa-microphone"></i>
                <div id="box3" class="action-box" style="height:150px"></div>
            </div>

            <div class="input-wrap">
                <textarea id="userInput" class="input-box" rows="1" oninput="autoExpand(this)" onkeydown="checkEnter(event)" autofocus></textarea>
                <i id="sendIcon" class="fas fa-paper-plane send-btn" onclick="send()"></i>
            </div>
        </div>
    </main>

    <script>
        let chats = []; let currentChatId = null; let activeBoxId = null;
        let isSignUp = false;

        function checkDevice() {
            const cameraBtn = document.getElementById('btn2');
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            cameraBtn.style.display = isMobile ? 'flex' : 'none';
        }

        window.onload = checkDevice;

        // AUTH LOGIC
        function toggleAuthModal() {
            document.getElementById('authOverlay').classList.toggle('show');
        }

        function switchAuthMode() {
            isSignUp = !isSignUp;
            document.getElementById('authTitle').innerText = isSignUp ? "Sign Up" : "Sign In";
            document.getElementById('authSub').innerText = isSignUp ? "Create a new verified account" : "Enter your verified account details";
            document.getElementById('signUpFields').style.display = isSignUp ? "block" : "none";
            document.getElementById('authToggleText').innerHTML = isSignUp ? 
                "Already have an account? <span>Sign In</span>" : 
                "New user? <span>Create an account</span>";
        }

        function showNamingModal() { document.getElementById('namingOverlay').classList.add('show'); document.getElementById('chatNameInput').focus(); }
        
        function createNewChat() {
            const input = document.getElementById('chatNameInput');
            const name = input.value.trim() || "Untitled Chat";
            const chat = { id: Date.now(), name, messages: [] };
            chats.unshift(chat); currentChatId = chat.id; input.value = "";
            document.getElementById('namingOverlay').classList.remove('show');
            renderHistory(); renderChat();
        }

        function renderHistory() {
            const list = document.getElementById('history-list'); list.innerHTML = "";
            chats.forEach(c => {
                const item = document.createElement('div');
                item.className = `history-item ${c.id === currentChatId ? 'active' : ''}`;
                item.innerText = c.name;
                item.onclick = () => { currentChatId = c.id; renderHistory(); renderChat(); };
                list.appendChild(item);
            });
        }

        function renderChat() {
            const container = document.getElementById('chat-container'); container.innerHTML = "";
            const current = chats.find(c => c.id === currentChatId); if (!current) return;
            current.messages.forEach(m => {
                const d = document.createElement('div'); d.className = `msg ${m.role}`; d.innerText = m.text;
                container.appendChild(d);
            });
            container.scrollTop = container.scrollHeight;
        }

        function openModal(title) { document.getElementById('modalTitle').innerText = title; document.getElementById('modalOverlay').classList.add('show'); }
        function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition(); recognition.lang = 'en-US'; recognition.interimResults = true;
            recognition.onresult = (e) => { 
                document.getElementById('userInput').value = Array.from(e.results).map(r => r[0].transcript).join(''); 
                autoExpand(document.getElementById('userInput')); 
            };
            recognition.onend = () => document.getElementById('btn3').classList.remove('recording');
        }

        function startVoiceRecognition(btnId) { 
            const btn = document.getElementById(btnId); 
            if (!recognition) return; 
            btn.classList.toggle('recording'); 
            if (btn.classList.contains('recording')) recognition.start(); else recognition.stop(); 
        }

        function toggleBox(boxId) { 
            const box = document.getElementById(boxId); 
            if (activeBoxId && activeBoxId !== boxId) document.getElementById(activeBoxId).classList.remove('active'); 
            box.classList.toggle('active'); 
            activeBoxId = box.classList.contains('active') ? boxId : null; 
        }

        function autoExpand(t) { t.style.height = 'auto'; t.style.height = (t.scrollHeight) + 'px'; }
        function checkEnter(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }

        async function send() {
            const input = document.getElementById('userInput'); const val = input.value.trim(); if (!val) return;
            if (!currentChatId) { const chat = { id: Date.now(), name: val.substring(0, 20), messages: [] }; chats.unshift(chat); currentChatId = chat.id; }
            const current = chats.find(c => c.id === currentChatId);
            current.messages.push({ role: "user", text: val }); renderChat(); renderHistory();
            input.value = ""; input.style.height = 'auto';
            const loadingIdx = current.messages.length; current.messages.push({ role: "ai", text: "..." }); renderChat();
            
            try {
                const res = await fetch("/api/chat", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ message: val }) });
                const data = await res.json(); current.messages[loadingIdx].text = data.candidates?.[0]?.content?.parts?.[0]?.text || "!";
            } catch (err) { current.messages[loadingIdx].text = "?"; }
            renderChat();
        }
    </script>
</body>
</html>
