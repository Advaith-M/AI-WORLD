<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> | AI VILE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #000000;
            --sidebar-bg: #0a0a0a;
            --line: rgba(255, 255, 255, 0.12); 
            --input-bg: rgba(255, 255, 255, 0.14); 
            --text: #ffffff;
            --accent: rgba(255, 255, 255, 0.2);
            --box-bg: #111111;
            --modal-bg: #161616;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            height: 100vh; 
            display: flex; 
            overflow: hidden; 
        }

        /* --- SIDEBAR HISTORY --- */
        aside { 
            width: 260px; 
            background: var(--sidebar-bg);
            border-right: 1px solid var(--line); 
            height: 100%;
            display: flex;
            flex-direction: column;
            transition: width 0.3s ease;
        }

        .sidebar-header {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px; /* Spacing between top buttons */
            border-bottom: 1px solid var(--line);
        }

        .nav-btn {
            width: 100%;
            padding: 12px;
            background: var(--input-bg);
            border: 1px solid var(--line);
            border-radius: 10px;
            color: white;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }

        .nav-btn:hover { background: var(--accent); }

        /* SCROLLABLE LIST AREA */
        #history-list {
            flex: 1;
            overflow-y: auto;
            padding: 20px 10px; /* Spacing between button group and list */
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.1) transparent;
        }

        #history-list::-webkit-scrollbar { width: 4px; }
        #history-list::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }

        .history-item {
            padding: 12px;
            margin-bottom: 5px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            color: #aaa;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: background 0.2s, color 0.2s;
        }

        .history-item:hover { background: rgba(255,255,255,0.05); color: #fff; }
        .history-item.active { background: var(--line); color: #fff; }

        main { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            height: 100%;
            min-width: 0; 
            position: relative;
        }

        #chat-container { 
            flex: 1; 
            overflow-y: auto; 
            padding: 40px; 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.2) transparent;
        }

        #chat-container::-webkit-scrollbar { width: 6px; }
        #chat-container::-webkit-scrollbar-thumb { background-color: rgba(255, 255, 255, 0.15); border-radius: 10px; }

        .msg { 
            max-width: 85%; 
            padding: 15px 20px; 
            border: 1px solid var(--line); 
            font-size: 14px;
            line-height: 1.6;
            color: #fff;
            border-radius: 10px; 
            white-space: pre-wrap;
            word-break: break-all;
        }

        @media (min-width: 768px) { .msg { max-width: 65%; } }
        .user { align-self: flex-end; border-color: rgba(255, 255, 255, 0.4); }
        .ai { align-self: flex-start; }

        /* --- MODALS --- */
        .modal-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(6px);
        }

        .modal-overlay.show { display: flex; }

        .central-poll {
            background: var(--modal-bg);
            width: 90%;
            max-width: 400px;
            border-radius: 20px;
            border: 1px solid var(--line);
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            text-align: center;
        }

        .modal-input {
            width: 100%;
            padding: 12px;
            margin: 20px 0;
            background: #000;
            border: 1px solid var(--line);
            border-radius: 8px;
            color: white;
            outline: none;
        }

        .modal-btn {
            padding: 10px 25px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        /* --- INPUT AREA --- */
        .input-area { 
            padding: 20px; 
            display: flex;
            justify-content: center;
            align-items: flex-end; 
            gap: 10px; 
            position: relative; 
        }

        @media (min-width: 1024px) { .input-area { padding: 46px; padding-right: 100px; gap: 12px; } }

        .action-box {
            position: absolute;
            bottom: 120%; 
            background: var(--box-bg);
            border: 1px solid var(--line);
            border-radius: 12px;
            width: 220px;
            display: none;
            z-index: 100;
            padding: 8px 0;
        }

        .action-box.active { display: block; animation: fadeIn 0.15s ease-out; }

        .poll-item {
            display: flex;
            align-items: center;
            padding: 12px 18px;
            color: #ccc;
            font-size: 14px;
            cursor: pointer;
            gap: 12px;
        }

        .poll-item:hover { background: var(--line); color: #fff; }

        .circle-btn {
            width: 44px; height: 44px;
            background: var(--input-bg);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #ffffff;
            font-size: 16px;
            flex-shrink: 0;
            margin-bottom: 2px;
            position: relative;
        }

        .circle-btn.recording { background: rgba(255, 0, 0, 0.3); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        .input-wrap { position: relative; width: 100%; max-width: 800px; display: flex; align-items: flex-end; }

        .input-box {
            width: 100%;
            background: var(--input-bg);
            border: none; 
            border-radius: 25px; 
            padding: 15px 50px 15px 20px; 
            color: var(--text);
            outline: none;
            font-size: 16px;
            resize: none;
            max-height: 160px; 
            overflow-y: auto;
        }

        .send-btn {
            position: absolute;
            right: 15px; bottom: 14px; 
            color: #ffffff; font-size: 18px;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            aside { display: none; }
            #chat-container { padding: 20px; }
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <aside>
        <div class="sidebar-header">
            <div class="nav-btn" onclick="showNamingModal()">
                <i class="fas fa-plus-circle"></i>
                <span>New Chat</span>
            </div>
            <div class="nav-btn" onclick="openModal('World')">
                <i class="fas fa-globe"></i>
                <span>World</span>
            </div>
            <div class="nav-btn" onclick="openModal('Settings')">
                <i class="fas fa-ellipsis-h"></i>
                <span>...</span>
            </div>
        </div>
        <div id="history-list"></div>
    </aside>

    <main>
        <div id="namingOverlay" class="modal-overlay">
            <div class="central-poll">
                <h2 style="font-size: 18px;">Name your Chat</h2>
                <input type="text" id="chatNameInput" class="modal-input" placeholder="e.g. My Project" autofocus>
                <button class="modal-btn" onclick="createNewChat()">Create Chat</button>
            </div>
        </div>

        <div id="modalOverlay" class="modal-overlay">
            <div class="central-poll">
                <i class="fas fa-times" style="float:right; cursor:pointer" onclick="closeModal()"></i>
                <h2 id="modalTitle" style="margin-bottom: 20px; font-size: 18px;"></h2>
                <div id="modalBody" style="color: #aaa;"></div>
            </div>
        </div>

        <div id="chat-container"></div>

        <div class="input-area">
            <div id="btn1" class="circle-btn" onclick="toggleBox('box1', 'btn1')">
                <i class="fas fa-plus"></i>
                <div id="box1" class="action-box">
                    <div class="poll-item" onclick="openModal('Attach File')"><i class="fas fa-paperclip"></i> Attach File</div>
                    <div class="poll-item" onclick="openModal('Search Link')"><i class="fas fa-link"></i> Search Link</div>
                    <div class="poll-item" onclick="openModal('Settings')"><i class="fas fa-cog"></i> Settings</div>
                    <div class="poll-item" onclick="openModal('Mode')"><i class="fas fa-layer-group"></i> Mode</div>
                    <div class="poll-item" onclick="openModal('Tools')"><i class="fas fa-tools"></i> Tools</div>
                </div>
            </div>

            <div id="btn2" class="circle-btn" onclick="toggleBox('box2', 'btn2')">
                <i class="fas fa-camera"></i>
                <div id="box2" class="action-box" style="height:150px"></div>
            </div>

            <div id="btn3" class="circle-btn" onclick="startVoiceRecognition('btn3')">
                <i class="fas fa-microphone"></i>
                <div id="box3" class="action-box" style="height:150px"></div>
            </div>

            <div class="input-wrap">
                <textarea id="userInput" class="input-box" rows="1" oninput="autoExpand(this)" onkeydown="checkEnter(event)" autofocus></textarea>
                <i id="sendIcon" class="fas fa-paper-plane send-btn" onclick="send()"></i>
            </div>
        </div>
    </main>

    <script>
        let chats = []; 
        let currentChatId = null;
        let activeBoxId = null;

        // --- CHAT HISTORY LOGIC ---
        function showNamingModal() {
            document.getElementById('namingOverlay').classList.add('show');
            document.getElementById('chatNameInput').focus();
        }

        function createNewChat() {
            const nameInput = document.getElementById('chatNameInput');
            const name = nameInput.value.trim() || "Untitled Chat";
            const newChat = { id: Date.now(), name: name, messages: [] };
            
            chats.unshift(newChat);
            currentChatId = newChat.id;
            
            nameInput.value = "";
            document.getElementById('namingOverlay').classList.remove('show');
            renderHistory();
            renderChat();
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            list.innerHTML = "";
            chats.forEach(chat => {
                const item = document.createElement('div');
                item.className = `history-item ${chat.id === currentChatId ? 'active' : ''}`;
                item.innerText = chat.name;
                item.onclick = () => { currentChatId = chat.id; renderHistory(); renderChat(); };
                list.appendChild(item);
            });
        }

        function renderChat() {
            const container = document.getElementById('chat-container');
            container.innerHTML = "";
            const currentChat = chats.find(c => c.id === currentChatId);
            if (!currentChat) return;
            
            currentChat.messages.forEach(m => {
                const d = document.createElement('div');
                d.className = `msg ${m.role}`;
                d.innerText = m.text;
                container.appendChild(d);
            });
            container.scrollTop = container.scrollHeight;
        }

        // --- UTILITY MODALS ---
        function openModal(title) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalOverlay').classList.add('show');
            if (activeBoxId) toggleBox(activeBoxId, ''); 
        }

        function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }

        // --- INPUT & VOICE ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'en-US';
            recognition.interimResults = true;
            recognition.onresult = (e) => {
                const input = document.getElementById('userInput');
                input.value = Array.from(e.results).map(r => r[0].transcript).join('');
                autoExpand(input);
            };
            recognition.onend = () => document.getElementById('btn3').classList.remove('recording');
        }

        function startVoiceRecognition(btnId) {
            const btn = document.getElementById(btnId);
            if (!recognition) return alert("Not supported.");
            btn.classList.toggle('recording');
            if (btn.classList.contains('recording')) recognition.start();
            else recognition.stop();
        }

        function toggleBox(boxId, btnId) {
            const box = document.getElementById(boxId);
            if (activeBoxId && activeBoxId !== boxId) document.getElementById(activeBoxId).classList.remove('active');
            box.classList.toggle('active');
            activeBoxId = box.classList.contains('active') ? boxId : null;
        }

        function autoExpand(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = (textarea.scrollHeight) + 'px';
        }

        function checkEnter(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }

        async function send() {
            const input = document.getElementById('userInput');
            const val = input.value.trim();
            if (!val) return;

            // Auto-create first chat if none exists
            if (!currentChatId) {
                const newChat = { id: Date.now(), name: val.substring(0, 20), messages: [] };
                chats.unshift(newChat);
                currentChatId = newChat.id;
            }

            const currentChat = chats.find(c => c.id === currentChatId);
            currentChat.messages.push({ role: "user", text: val });
            renderChat();
            renderHistory();
            
            input.value = "";
            input.style.height = 'auto';
            
            const loadingIdx = currentChat.messages.length;
            currentChat.messages.push({ role: "ai", text: "..." });
            renderChat();

            try {
                const res = await fetch("/api/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: val })
                });
                const data = await res.json();
                currentChat.messages[loadingIdx].text = data.candidates?.[0]?.content?.parts?.[0]?.text || "!";
            } catch (err) { currentChat.messages[loadingIdx].text = "?"; }
            renderChat();
        }

        window.addEventListener('DOMContentLoaded', () => {
            const isMobile = /iPhone|iPad|iPod|Android|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            if (!isMobile) document.getElementById('btn2').style.display = 'none';
        });
    </script>
</body>
</html>
