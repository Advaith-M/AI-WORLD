<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI VILE | The Council</title>
    <!-- Optimized FontAwesome to bypass Tracking Prevention -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.0/css/all.min.css" crossorigin="anonymous">
    <style>
        :root {
            --bg: #000000;
            --sidebar-bg: #0a0a0a;
            --line: rgba(255, 255, 255, 0.12); 
            --input-bg: rgba(255, 255, 255, 0.14); 
            --text: #ffffff;
            --accent: rgba(255, 255, 255, 0.2);
            --box-bg: #111111;
            --modal-bg: #161616;
            --user-outline: rgba(255, 255, 255, 0.3);
            --ai-outline: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            height: 100vh; 
            display: flex; 
            overflow: hidden; 
        }

        /* --- SIDEBAR --- */
        aside { 
            width: 280px; 
            background: var(--sidebar-bg);
            border-right: 1px solid var(--line); 
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .top-nav { padding: 15px 20px 5px 20px; display: flex; gap: 10px; }
        .sidebar-header { padding: 10px 20px 10px 20px; display: flex; flex-direction: column; gap: 10px; }

        .nav-btn {
            width: 100%;
            padding: 12px;
            background: var(--input-bg);
            border: 1px solid var(--line);
            border-radius: 10px;
            color: white;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .nav-btn:hover { background: var(--accent); }

        .hanging-label {
            padding: 15px 25px 5px 25px;
            font-size: 11px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        #history-list {
            flex: 1;
            overflow-y: auto;
            padding: 5px 10px;
        }

        .history-item {
            padding: 12px;
            margin-bottom: 4px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            color: #888;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-item:hover { background: rgba(255,255,255,0.05); color: #fff; }
        .history-item.active { background: var(--line); color: #fff; }

        .sidebar-footer { padding: 15px 20px; border-top: 1px solid var(--line); }

        /* --- MAIN AREA --- */
        main { flex: 1; display: flex; flex-direction: column; height: 100%; position: relative; }

        .profile-trigger {
            position: absolute; right: 20px; top: 20px;
            width: 42px; height: 42px;
            background: var(--input-bg);
            border: 1px solid var(--line);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: #fff; z-index: 60;
        }

        #chat-container { 
            flex: 1; 
            overflow-y: auto; 
            padding: 80px 15% 40px 15%; 
            display: flex; flex-direction: column; gap: 24px; 
        }

        .msg { 
            max-width: 80%; 
            padding: 16px 20px; 
            font-size: 15px;
            line-height: 1.6;
            color: #eee;
            border-radius: 18px;
            animation: fadeIn 0.4s ease;
        }

        .user { align-self: flex-end; background: #1a1a1a; border: 1px solid var(--user-outline); }
        .ai { align-self: flex-start; background: #111; border: 1px solid var(--ai-outline); }

        /* --- INPUT AREA --- */
        .input-area { padding: 20px 15%; display: flex; gap: 12px; align-items: flex-end; }

        .circle-btn {
            width: 52px; height: 52px;
            background: var(--input-bg);
            border: 1px solid var(--line);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: #ffffff; flex-shrink: 0;
        }

        .mic-active { background: #fff !important; color: #000 !important; }

        .input-wrap { position: relative; width: 100%; }

        .input-box {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--line); 
            border-radius: 26px; 
            padding: 15px 55px 15px 22px; 
            color: var(--text);
            outline: none; font-size: 16px;
            resize: none;
        }

        .send-btn {
            position: absolute; right: 18px; bottom: 15px; 
            color: rgba(255,255,255,0.3); font-size: 18px;
            cursor: pointer;
        }
        .send-btn.primed { color: #fff; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Modal simple styles */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 100;
        }
        .modal-overlay.show { display: flex; }
        .modal-content { background: var(--modal-bg); padding: 30px; border-radius: 20px; text-align: center; width: 300px; border: 1px solid var(--line); }
    </style>
</head>
<body>

    <aside>
        <div class="top-nav">
            <div class="nav-btn"><i class="fas fa-search"></i></div>
            <div class="nav-btn"><i class="fas fa-bars"></i></div>
        </div>
        <div class="sidebar-header">
            <div class="nav-btn" onclick="showNamingModal()"><i class="fas fa-plus-circle"></i><span>New Chat</span></div>
        </div>
        <div class="hanging-label">History</div>
        <div id="history-list"></div>
    </aside>

    <main>
        <div class="profile-trigger"><i class="fas fa-user"></i></div>
        <div id="chat-container"></div>

        <div class="input-area">
            <div class="circle-btn"><i class="fas fa-plus"></i></div>
            <div id="micBtn" class="circle-btn" onclick="startVoice()"><i class="fas fa-microphone"></i></div>
            <div class="input-wrap">
                <textarea id="userInput" class="input-box" rows="1" onkeydown="handleKey(event)" placeholder="Double-tap Enter to send..."></textarea>
                <i id="sendIcon" class="fas fa-paper-plane send-btn" onclick="send()"></i>
            </div>
        </div>
    </main>

    <!-- Naming Modal -->
    <div id="namingModal" class="modal-overlay">
        <div class="modal-content">
            <h3 style="margin-bottom:15px">Name Chat</h3>
            <input type="text" id="chatNameInput" style="width:100%; padding:10px; margin-bottom:15px; background:#000; color:#fff; border:1px solid var(--line)">
            <button onclick="createNewChat()" style="width:100%; padding:10px; cursor:pointer">Create</button>
        </div>
    </div>

    <script>
        let chats = [];
        let currentChatId = null;
        let lastEnter = 0;

        function showNamingModal() { document.getElementById('namingModal').classList.add('show'); }
        
        function createNewChat() {
            const name = document.getElementById('chatNameInput').value || "New Chat";
            const chat = { id: Date.now(), name, messages: [] };
            chats.unshift(chat);
            currentChatId = chat.id;
            document.getElementById('namingModal').classList.remove('show');
            renderHistory();
            renderChat();
        }

        function handleKey(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                const now = Date.now();
                if (now - lastEnter < 500) {
                    e.preventDefault();
                    send();
                }
                lastEnter = now;
            }
        }

        async function send() {
            const input = document.getElementById('userInput');
            const val = input.value.trim();
            if (!val) return;

            if (!currentChatId) createNewChat();
            const current = chats.find(c => c.id === currentChatId);
            current.messages.push({ role: "user", text: val });
            renderChat();
            input.value = "";

            // Loading state
            const loadIdx = current.messages.length;
            current.messages.push({ role: "ai", text: "Consulting the Council..." });
            renderChat();

            try {
                // CALLING THE VERCEL API FOLDER
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: val })
                });
                
                const data = await response.json();
                
                // Combining the 3 AI responses
                const result = `**OpenAI:** ${data.gpt}\n\n**Gemini:** ${data.gemini}\n\n**Groq:** ${data.groq}`;
                current.messages[loadIdx].text = result;
            } catch (err) {
                current.messages[loadIdx].text = "Error connecting to the AI Council.";
            }
            renderChat();
            renderHistory();
        }

        function renderChat() {
            const container = document.getElementById('chat-container');
            container.innerHTML = "";
            const current = chats.find(c => c.id === currentChatId);
            if (!current) return;
            current.messages.forEach(m => {
                const div = document.createElement('div');
                div.className = `msg ${m.role}`;
                div.innerHTML = m.text.replace(/\n/g, '<br>');
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            list.innerHTML = "";
            chats.forEach(c => {
                const div = document.createElement('div');
                div.className = `history-item ${c.id === currentChatId ? 'active' : ''}`;
                div.innerText = c.name;
                div.onclick = () => { currentChatId = c.id; renderChat(); renderHistory(); };
                list.appendChild(div);
            });
        }

        function startVoice() {
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!Speech) return alert("Voice not supported");
            const rec = new Speech();
            rec.onstart = () => document.getElementById('micBtn').classList.add('mic-active');
            rec.onresult = (e) => document.getElementById('userInput').value = e.results[0][0].transcript;
            rec.onend = () => document.getElementById('micBtn').classList.remove('mic-active');
            rec.start();
        }
    </script>
</body>
</html>
