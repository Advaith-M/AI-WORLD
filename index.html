<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> | AI VILE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #000000;
            --sidebar-bg: #0a0a0a;
            --line: rgba(255, 255, 255, 0.12); 
            --input-bg: rgba(255, 255, 255, 0.14); 
            --text: #ffffff;
            --accent: rgba(255, 255, 255, 0.2);
            --modal-bg: #161616;
            --user-outline: rgba(255, 255, 255, 0.3);
            --ai-outline: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }

        /* --- SIDEBAR --- */
        aside { 
            width: 280px; background: var(--sidebar-bg); border-right: 1px solid var(--line); 
            height: 100%; display: flex; flex-direction: column; 
        }
        .top-nav { padding: 15px 20px 5px 20px; display: flex; gap: 10px; }
        .sidebar-header { padding: 10px 20px 10px 20px; display: flex; flex-direction: column; gap: 10px; }
        .nav-btn {
            width: 100%; padding: 12px; background: var(--input-bg); border: 1px solid var(--line);
            border-radius: 10px; color: white; display: flex; align-items: center; gap: 12px;
            cursor: pointer; font-size: 14px; transition: all 0.2s;
        }
        .nav-btn:hover { background: var(--accent); }
        .hanging-label { padding: 15px 25px 5px 25px; font-size: 11px; font-weight: 700; color: rgba(255, 255, 255, 0.3); letter-spacing: 1.5px; text-transform: uppercase; }
        #history-list { flex: 1; overflow-y: auto; padding: 5px 10px; scrollbar-width: none; }

        /* --- MAIN AREA --- */
        main { flex: 1; display: flex; flex-direction: column; height: 100%; position: relative; }
        .profile-trigger {
            position: absolute; right: 20px; top: 20px; width: 42px; height: 42px;
            background: var(--input-bg); border: 1px solid var(--line); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 60;
        }

        #chat-container { 
            flex: 1; overflow-y: auto; padding: 80px 15% 40px 15%; 
            display: flex; flex-direction: column; gap: 24px; scrollbar-width: none;
        }

        /* Message Styles */
        .msg { 
            max-width: 80%; padding: 16px 20px; font-size: 15px; line-height: 1.6; color: #eee;
            animation: entry 0.4s ease-out; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        @keyframes entry { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .user { align-self: flex-end; background: #1a1a1a; border: 1px solid var(--user-outline); border-radius: 18px 18px 4px 18px; }
        .ai { align-self: flex-start; background: #111; border: 1px solid var(--ai-outline); border-radius: 18px 18px 18px 4px; }

        /* --- INPUT AREA --- */
        .input-area { padding: 20px 15%; display: flex; justify-content: center; align-items: flex-end; gap: 12px; }
        .circle-btn {
            width: 52px; height: 52px; background: var(--input-bg); border: 1px solid var(--line);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: #fff; flex-shrink: 0; transition: all 0.3s;
        }

        /* The Best Mic State */
        .mic-active { 
            background: #fff !important; color: #000 !important; 
            box-shadow: 0 0 20px #fff; animation: micPulse 1.5s infinite;
        }
        @keyframes micPulse { 0% { transform: scale(1); } 50% { transform: scale(1.08); } 100% { transform: scale(1); } }

        .input-wrap { position: relative; width: 100%; display: flex; align-items: flex-end; }
        .input-box {
            width: 100%; background: var(--input-bg); border: 1px solid var(--line); 
            border-radius: 26px; padding: 15px 55px 15px 22px; color: var(--text);
            outline: none; font-size: 16px; resize: none; max-height: 150px; overflow-y: hidden;
        }

        .send-btn { position: absolute; right: 18px; bottom: 15px; color: rgba(255,255,255,0.3); font-size: 18px; cursor: pointer; transition: 0.3s; }
        .send-btn.primed { color: #fff; transform: scale(1.1); }

        /* Modals */
        .modal-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); display: none; justify-content: center; align-items: center;
            z-index: 1000; backdrop-filter: blur(10px);
        }
        .modal-overlay.show { display: flex; }
        .central-poll { background: var(--modal-bg); width: 90%; max-width: 400px; border-radius: 24px; border: 1px solid var(--line); padding: 40px; text-align: center; }
        .modal-input { width: 100%; padding: 14px; margin: 10px 0; background: #000; border: 1px solid var(--line); border-radius: 12px; color: white; outline: none; }
        .modal-btn { width: 100%; padding: 14px; margin-top: 15px; background: #fff; color: #000; border: none; border-radius: 12px; cursor: pointer; font-weight: 700; }
        .modal-btn.secondary { background: transparent; color: #888; border: 1px solid var(--line); margin-top: 8px; }
    </style>
</head>
<body>

    <aside>
        <div class="top-nav">
            <div class="nav-btn"><i class="fas fa-search"></i></div>
            <div class="nav-btn"><i class="fas fa-bars"></i></div>
        </div>
        <div class="sidebar-header">
            <div class="nav-btn" onclick="showModal()"><i class="fas fa-plus-circle"></i><span>New Chat</span></div>
        </div>
        <div class="hanging-label">History</div>
        <div id="history-list"></div>
    </aside>

    <main>
        <div class="profile-trigger"><i class="fas fa-user"></i></div>

        <div id="namingOverlay" class="modal-overlay">
            <div class="central-poll">
                <h2>New Chat</h2>
                <input type="text" id="chatNameInput" class="modal-input" placeholder="Chat name..." autofocus>
                <button class="modal-btn" onclick="createNewChat()">Create</button>
                <button class="modal-btn secondary" onclick="hideModal()">Cancel</button>
            </div>
        </div>

        <div id="chat-container"></div>

        <div class="input-area">
            <div class="circle-btn"><i class="fas fa-plus"></i></div>
            <div id="micBtn" class="circle-btn" onclick="handleMic()">
                <i class="fas fa-microphone"></i>
            </div>
            <div class="input-wrap">
                <textarea id="userInput" class="input-box" rows="1" oninput="autoExpand(this)" onkeydown="handleDoubleEnter(event)" placeholder="Double-tap Enter to send..."></textarea>
                <i id="sendIcon" class="fas fa-paper-plane send-btn" onclick="send()"></i>
            </div>
        </div>
    </main>

    <script>
        let chats = [];
        let currentId = null;
        let lastEnter = 0;
        let recognition;
        let isListening = false;

        /* --- BEST QUALITY VOICE LOGIC --- */
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new Speech();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'en-US';

            recognition.onresult = (event) => {
                let text = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    text += event.results[i][0].transcript;
                }
                const input = document.getElementById('userInput');
                input.value = text;
                autoExpand(input);
            };

            recognition.onend = () => {
                isListening = false;
                document.getElementById('micBtn').classList.remove('mic-active');
            };
        }

        function handleMic() {
            if (!recognition) return alert("Speech not supported");
            if (isListening) {
                recognition.stop();
            } else {
                recognition.start();
                isListening = true;
                document.getElementById('micBtn').classList.add('mic-active');
            }
        }

        /* --- DOUBLE ENTER LOGIC --- */
        function handleDoubleEnter(e) {
            const icon = document.getElementById('sendIcon');
            if (e.key === 'Enter' && !e.shiftKey) {
                const now = Date.now();
                if (now - lastEnter < 500) {
                    e.preventDefault();
                    send();
                    icon.classList.remove('primed');
                    lastEnter = 0;
                } else {
                    lastEnter = now;
                    icon.classList.add('primed');
                    setTimeout(() => { if (Date.now() - lastEnter >= 500) icon.classList.remove('primed'); }, 510);
                }
            }
        }

        function autoExpand(t) {
            t.style.height = 'auto';
            t.style.height = t.scrollHeight + 'px';
            t.style.overflowY = t.scrollHeight > 140 ? 'auto' : 'hidden';
        }

        function send() {
            const input = document.getElementById('userInput');
            const val = input.value.trim();
            if (!val) return;

            if (!currentId) {
                const chat = { id: Date.now(), name: val.substring(0, 20), messages: [] };
                chats.unshift(chat); currentId = chat.id;
            }

            const current = chats.find(c => c.id === currentId);
            current.messages.push({ role: "user", text: val });
            renderChat(); renderHistory();
            input.value = ""; input.style.height = 'auto';

            setTimeout(() => {
                current.messages.push({ role: "ai", text: "Response received." });
                renderChat();
            }, 600);
        }

        function renderChat() {
            const container = document.getElementById('chat-container');
            container.innerHTML = "";
            const current = chats.find(c => c.id === currentId);
            if (!current) return;
            current.messages.forEach(m => {
                const d = document.createElement('div');
                d.className = `msg ${m.role}`;
                d.innerText = m.text;
                container.appendChild(d);
            });
            container.scrollTop = container.scrollHeight;
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            list.innerHTML = "";
            chats.forEach(c => {
                const item = document.createElement('div');
                item.className = `nav-btn ${c.id === currentId ? 'active' : ''}`;
                item.style.marginBottom = "5px";
                item.innerText = c.name;
                item.onclick = () => { currentId = c.id; renderChat(); renderHistory(); };
                list.appendChild(item);
            });
        }

        function showModal() { document.getElementById('namingOverlay').classList.add('show'); }
        function hideModal() { document.getElementById('namingOverlay').classList.remove('show'); }
        function createNewChat() {
            const name = document.getElementById('chatNameInput').value || "New Chat";
            const chat = { id: Date.now(), name, messages: [] };
            chats.unshift(chat); currentId = chat.id;
            hideModal(); renderHistory(); renderChat();
        }
    </script>
</body>
</html>
