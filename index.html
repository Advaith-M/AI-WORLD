<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> | AI VILE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #000000;
            --line: rgba(255, 255, 255, 0.12); 
            --input-bg: rgba(255, 255, 255, 0.14); 
            --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            height: 100vh; 
            display: flex; 
            overflow: hidden; 
        }

        aside { 
            width: 253px; 
            border-right: 4.45px solid var(--line); 
            height: 100%;
        }

        main { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            height: 100%;
        }

        header {
            height: 0px;
            border-bottom: 1px solid var(--line);
        }

        #chat-container { 
            flex: 1; 
            overflow-y: auto; 
            padding: 40px; 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
        }

        .msg { 
            max-width: 65%; 
            padding: 15px 20px; 
            border: 1px solid var(--line); 
            font-size: 14px;
            line-height: 1.6;
            color: #fff;
            border-radius: 10px; 
            white-space: pre-wrap;
            word-break: break-all;
            overflow-wrap: anywhere;
        }

        .user { 
            align-self: flex-end; 
            border-color: rgba(255, 255, 255, 0.4); 
        }

        .ai { align-self: flex-start; }

        .input-area { 
            padding: 46px;
            display: flex;
            justify-content: center;
            padding-right: 100px; 
            align-items: flex-end; 
            gap: 15px; 
            position: relative; 
        }

        .circle-btn {
            width: 58px;
            height: 58px;
            background: var(--input-bg);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #ffffff;
            font-size: 20px;
            transition: transform 0.1s cubic-bezier(0.4, 0, 0.2, 1), background 0.32s;
            flex-shrink: 0;
            margin-bottom: 2px;
        }

        .circle-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .circle-btn.clicked {
            transform: scale(0.85);
        }

        .input-wrap {
            position: relative;
            width: 100%;
            max-width: 800px;
            display: flex;
            align-items: flex-end;
        }

        .input-box {
            width: 100%;
            background: var(--input-bg);
            border: none; 
            border-radius: 25px; 
            padding: 20px 60px 20px 30px; 
            color: var(--text);
            outline: none;
            font-size: 16px;
            transition: background 0.32s ease;
            word-break: break-all;
            resize: none;
            line-height: 1.5; 
            max-height: 160px; 
            overflow-y: auto;
            display: block;
            scrollbar-width: none; 
            -ms-overflow-style: none; 
        }

        .input-box::-webkit-scrollbar {
            display: none;
            width: 0 !important;
            height: 0 !important;
        }

        .input-box:focus {
            background: rgba(255, 255, 255, 0.14);
        }

        .send-btn {
            position: absolute;
            right: 24.5px;
            bottom: 18px; 
            color: #ffffff;
            font-size: 21.5px;
            cursor: pointer;
            opacity: 1;
            transition: transform 0.1s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.34s;
        }

        .send-btn.clicked {
            transform: scale(0.8);
        }

        #chat-container::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <aside></aside>

    <main>
        <header></header>
        
        <div id="chat-container"></div>

        <div class="input-area">
            <div id="btn1" class="circle-btn" onclick="triggerAction('btn1')">
                <i class="fas fa-plus"></i>
            </div>

            <div id="btn2" class="circle-btn" onclick="triggerAction('btn2')">
                <i class="fas fa-camera"></i>
            </div>

            <div id="btn3" class="circle-btn" onclick="triggerAction('btn3')">
                <i class="fas fa-microphone"></i>
            </div>

            <div class="input-wrap">
                <textarea id="userInput" class="input-box" rows="1" placeholder="" oninput="autoExpand(this)" onkeydown="checkEnter(event)" autofocus></textarea>
                <i id="sendIcon" class="fas fa-paper-plane send-btn" onclick="send()"></i>
            </div>
        </div>
    </main>

    <script>
        const memory = [];

        // Device Detection: Runs on load to hide Camera button on desktops
        window.addEventListener('DOMContentLoaded', () => {
            const cameraBtn = document.getElementById('btn2');
            const isMobile = /iPhone|iPad|iPod|Android|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            
            if (!isMobile) {
                cameraBtn.style.display = 'none';
            }
        });

        function autoExpand(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = (textarea.scrollHeight) + 'px';
        }

        function checkEnter(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                send();
            }
        }

        function triggerAction(id) {
            const btn = document.getElementById(id);
            btn.classList.add('clicked');
            setTimeout(() => btn.classList.remove('clicked'), 100);
        }

        function renderChat() {
            const container = document.getElementById('chat-container');
            container.innerHTML = "";
            memory.forEach(m => {
                const d = document.createElement('div');
                d.className = `msg ${m.role}`;
                d.innerText = m.text;
                container.appendChild(d);
            });
            container.scrollTop = container.scrollHeight;
        }

        async function send() {
            const input = document.getElementById('userInput');
            const icon = document.getElementById('sendIcon');
            const val = input.value.trim();
            if (!val) return;

            icon.classList.add('clicked');
            setTimeout(() => icon.classList.remove('clicked'), 100);

            memory.push({ role: "user", text: val });
            renderChat();
            
            input.value = "";
            input.style.height = 'auto';

            const loadingIdx = memory.length;
            memory.push({ role: "ai", text: "..." });
            renderChat();

            try {
                const res = await fetch("/api/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: val })
                });

                const data = await res.json();
                const responseText = data.candidates?.[0]?.content?.parts?.[0]?.text || "!";
                memory[loadingIdx].text = responseText;
            } catch (err) {
                memory[loadingIdx].text = "?";
            }
            renderChat();
        }
    </script>
</body>
</html>
