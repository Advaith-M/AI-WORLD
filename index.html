<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI WORLD | Command Center</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        :root {
            --bg: #030305;
            --silver: #e0e0e0;
            --glass-bg: rgba(255, 255, 255, 0.03); 
            --glass-border: rgba(255, 255, 255, 0.15);
            --text: #ffffff;
            --glow: rgba(255, 255, 255, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            height: 100vh; 
            display: flex; 
            overflow: hidden; 
            position: relative;
        }

        body::before {
            content: "";
            position: absolute;
            width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 10% 20%, rgba(0, 150, 255, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(255, 50, 50, 0.08) 0%, transparent 40%);
            z-index: -1;
            animation: pulseBg 8s ease-in-out infinite alternate;
        }

        @keyframes pulseBg { from { opacity: 0.6; } to { opacity: 1; } }

        aside { 
            width: 280px; 
            background: rgba(5, 5, 7, 0.6); 
            backdrop-filter: blur(30px); 
            -webkit-backdrop-filter: blur(30px);
            border-right: 1px solid var(--glass-border); 
            padding: 30px; display: flex; flex-direction: column; justify-content: space-between;
            z-index: 100;
        }

        main { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }

        .module-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-right: 6px solid var(--silver);
            padding: 40px; 
            border-radius: 50px;
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
            width: 650px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.7), inset 0 0 20px rgba(255,255,255,0.05);
            animation: springIn 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes springIn {
            0% { transform: scale(0.85) translateY(20px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        .nav-item {
            position: relative;
            padding: 22px; 
            background: rgba(255, 255, 255, 0.04); 
            border: 1px solid var(--glass-border); 
            border-radius: 25px;
            cursor: pointer; display: flex; align-items: center; gap: 15px; 
            transition: all 0.4s ease;
            overflow: hidden;
        }

        .nav-item:hover { 
            background: rgba(255, 255, 255, 0.1); 
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4), 0 0 15px var(--glow);
        }

        .nav-item.full { grid-column: span 2; }

        .ai-interface {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; transform: translateY(100%);
            transition: transform 0.7s cubic-bezier(0.85, 0, 0.15, 1); 
            background: rgba(3, 3, 5, 0.9);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            z-index: 150;
        }
        .ai-interface.active { transform: translateY(0); }

        .interface-header {
            padding: 30px 50px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .quick-nav { display: flex; gap: 25px; }
        .quick-icon { color: #ffffff; font-size: 20px; cursor: pointer; opacity: 0.3; transition: 0.4s; }
        .quick-icon.active-icon { opacity: 1; filter: drop-shadow(0 0 10px #fff); }

        .chat-scroll { flex: 1; overflow-y: auto; padding: 40px 50px; display: flex; flex-direction: column; gap: 15px; }
        
        .msg { 
            max-width: 75%; padding: 16px 24px; border-radius: 25px; font-size: 15px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            line-height: 1.5;
        }
        .user { align-self: flex-end; background: rgba(255,255,255,0.1); }
        .ai { align-self: flex-start; background: rgba(255,255,255,0.03); }

        .input-bar { padding: 30px; }
        .input-wrap { 
            max-width: 850px; margin: 0 auto; 
            background: rgba(255,255,255,0.05); 
            border: 1px solid var(--glass-border); 
            border-radius: 50px; padding: 18px 35px; 
            display: flex; align-items: center;
        }
        input { flex: 1; background: transparent; border: none; color: white; outline: none; font-size: 16px; }

        .logo { font-size: 26px; font-weight: 800; letter-spacing: -1px; }
        .status { font-size: 10px; color: var(--silver); letter-spacing: 3px; opacity: 0.5; }
    </style>
</head>
<body>
    <aside>
        <div>
            <div class="logo">AI WORLD</div>
            <div class="status">● CORE ACTIVE</div>
        </div>
        <div class="status" style="font-size: 9px; cursor:pointer;" onclick="location.reload()">REBOOT SYSTEM</div>
    </aside>

    <main>
        <div class="module-panel" id="main-hub">
            <div class="nav-item full" onclick="openAI('CHAT')"><i class="fas fa-comment-alt"></i><span>CHAT</span></div>
            <div class="nav-item" onclick="openAI('NOTEBOOK')"><i class="fas fa-book-open"></i><span>NOTEBOOK</span></div>
            <div class="nav-item" onclick="openAI('CODE')"><i class="fas fa-code"></i><span>CODE</span></div>
            <div class="nav-item" onclick="openAI('GAME')"><i class="fas fa-gamepad"></i><span>GAME</span></div>
            <div class="nav-item" onclick="openAI('LANGUAGE')"><i class="fas fa-language"></i><span>LANGUAGE</span></div>
            <div class="nav-item" onclick="openAI('IMAGE')"><i class="fas fa-image"></i><span>IMAGE</span></div>
            <div class="nav-item" onclick="openAI('VIDEO')"><i class="fas fa-video"></i><span>VIDEO</span></div>
            <div class="nav-item full" onclick="openAI('WORLD')"><i class="fas fa-globe"></i><span>WORLD HUB</span></div>
        </div>

        <div id="ai-view" class="ai-interface">
            <div class="interface-header">
                <div class="quick-nav">
                    <i id="btn-CHAT" class="fas fa-comment-alt quick-icon" onclick="openAI('CHAT')"></i>
                    <i id="btn-NOTEBOOK" class="fas fa-book-open quick-icon" onclick="openAI('NOTEBOOK')"></i>
                    <i id="btn-CODE" class="fas fa-code quick-icon" onclick="openAI('CODE')"></i>
                    <i id="btn-GAME" class="fas fa-gamepad quick-icon" onclick="openAI('GAME')"></i>
                    <i id="btn-IMAGE" class="fas fa-image quick-icon" onclick="openAI('IMAGE')"></i>
                    <i id="btn-VIDEO" class="fas fa-video quick-icon" onclick="openAI('VIDEO')"></i>
                </div>
                <div style="cursor:pointer; opacity: 0.5;" onclick="document.getElementById('ai-view').classList.remove('active')">
                    <i class="fas fa-chevron-down"></i>
                </div>
            </div>
            <div id="chat-container" class="chat-scroll"></div>
            <div class="input-bar">
                <div class="input-wrap">
                    <input type="text" id="userInput" placeholder="Signal..." onkeypress="if(event.key==='Enter') send()">
                    <i class="fas fa-paper-plane" onclick="send()" style="cursor:pointer; opacity: 0.6;"></i>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Pattern-breaker key assembly
        const _p1 = "AIzaSyCzW";
        const _p2 = "BUKouNnIv7o";
        const _p3 = "YfxlcL0c7fY";
        const _p4 = "TwleLZ8";
        const API_KEY = _p1 + _p2 + _p3 + _p4;

        let currentMode = "CHAT";
        const memory = { "CHAT":[], "NOTEBOOK":[], "CODE":[], "GAME":[], "LANGUAGE":[], "IMAGE":[], "VIDEO":[], "WORLD":[] };

        function openAI(name) {
            currentMode = name;
            document.getElementById('ai-view').classList.add('active');
            document.querySelectorAll('.quick-icon').forEach(i => i.classList.remove('active-icon'));
            const icon = document.getElementById(`btn-${name}`);
            if(icon) icon.classList.add('active-icon');
            renderChat();
        }

        function renderChat() {
            const container = document.getElementById('chat-container');
            container.innerHTML = "";
            memory[currentMode].forEach(m => {
                const d = document.createElement('div');
                d.className = `msg ${m.role}`;
                d.innerText = m.text;
                container.appendChild(d);
            });
            container.scrollTop = container.scrollHeight;
        }

        async function send() {
            const input = document.getElementById('userInput');
            const val = input.value.trim();
            if(!val) return;

            memory[currentMode].push({role:'user', text: val});
            renderChat();
            input.value = "";

            const loadingIdx = memory[currentMode].length;
            memory[currentMode].push({role:'ai', text: "● ● ●"});
            renderChat();

            try {
                // MODEL: Gemini 3.1 Flash-Lite (Optimized)
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite-preview:generateContent?key=${API_KEY}`;
                
                const res = await fetch(url, {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({contents: [{parts: [{text: val}]}]})
                });

                const data = await res.json();
                
                if (data.candidates && data.candidates[0].content) {
                    memory[currentMode][loadingIdx].text = data.candidates[0].content.parts[0].text;
                } else {
                    memory[currentMode][loadingIdx].text = "SYSTEM ERROR: " + (data.error ? data.error.message : "Handshake Failed");
                }
            } catch(e) {
                memory[currentMode][loadingIdx].text = "SIGNAL LOST. Check connection.";
            }
            renderChat();
        }
    </script>
</body>
</html>
