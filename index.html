<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> | AI VILE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #000000;
            --sidebar-bg: #0a0a0a;
            --line: rgba(255, 255, 255, 0.12); 
            --input-bg: rgba(255, 255, 255, 0.14); 
            --text: #ffffff;
            --accent: rgba(255, 255, 255, 0.2);
            --box-bg: #111111;
            --modal-bg: #161616;
            --user-outline: rgba(255, 255, 255, 0.3);
            --ai-outline: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            height: 100vh; 
            display: flex; 
            overflow: hidden; 
        }

        /* --- SIDEBAR --- */
        aside { 
            width: 280px; 
            background: var(--sidebar-bg);
            border-right: 1px solid var(--line); 
            height: 100%;
            display: flex;
            flex-direction: column;
            transition: width 0.3s ease;
        }

        .top-nav { padding: 15px 20px 5px 20px; display: flex; gap: 10px; }
        .sidebar-header { padding: 10px 20px 10px 20px; display: flex; flex-direction: column; gap: 10px; }

        .nav-btn {
            width: 100%;
            padding: 12px;
            background: var(--input-bg);
            border: 1px solid var(--line);
            border-radius: 10px;
            color: white;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .nav-btn:active, .circle-btn:active { transform: scale(0.95); }
        .nav-btn:hover { background: var(--accent); }

        .icon-btn { flex: 1; justify-content: center; padding: 10px; font-size: 16px; }

        .hanging-label {
            padding: 15px 25px 5px 25px;
            font-size: 11px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        #history-list {
            flex: 1;
            overflow-y: auto;
            padding: 5px 10px;
            scrollbar-width: thin;
            scrollbar-color: transparent transparent;
        }

        #history-list:hover { scrollbar-color: rgba(255, 255, 255, 0.1) transparent; }

        .history-item {
            padding: 12px;
            margin-bottom: 4px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            color: #888;
            transition: all 0.2s ease;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-item:hover { background: rgba(255,255,255,0.05); color: #fff; }
        .history-item.active { background: var(--line); color: #fff; }

        .sidebar-footer { padding: 15px 20px; border-top: 1px solid var(--line); }

        /* --- MAIN AREA --- */
        main { flex: 1; display: flex; flex-direction: column; height: 100%; position: relative; }

        .profile-trigger {
            position: absolute; right: 20px; top: 20px;
            width: 42px; height: 42px;
            background: var(--input-bg);
            border: 1px solid var(--line);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: #fff; z-index: 60;
            transition: all 0.3s ease;
        }
        .profile-trigger:hover { background: var(--accent); transform: rotate(5deg); }

        #chat-container { 
            flex: 1; 
            overflow-y: auto; 
            padding: 80px 15% 40px 15%; 
            display: flex; flex-direction: column; gap: 24px; 
            scrollbar-width: thin;
            scrollbar-color: transparent transparent;
        }

        #chat-container:hover { scrollbar-color: rgba(255, 255, 255, 0.1) transparent; }

        /* Professional Message Outlines */
        .msg { 
            max-width: 80%; 
            padding: 16px 20px; 
            font-size: 15px;
            line-height: 1.6;
            color: #eee;
            position: relative;
            animation: msgFade 0.4s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        @keyframes msgFade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .user { 
            align-self: flex-end; 
            background: #1a1a1a;
            border: 1px solid var(--user-outline);
            border-radius: 18px 18px 4px 18px; 
        }

        .ai { 
            align-self: flex-start; 
            background: #111;
            border: 1px solid var(--ai-outline);
            border-radius: 18px 18px 18px 4px; 
        }

        /* --- MODALS --- */
        .modal-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none; justify-content: center; align-items: center;
            z-index: 1000; backdrop-filter: blur(12px);
        }
        .modal-overlay.show { display: flex; animation: fadeIn 0.3s ease; }

        .central-poll {
            background: var(--modal-bg);
            width: 90%; max-width: 400px;
            border-radius: 24px; border: 1px solid var(--line);
            padding: 40px; text-align: center;
        }

        .modal-input {
            width: 100%; padding: 14px; margin: 10px 0;
            background: #000; border: 1px solid var(--line);
            border-radius: 12px; color: white; outline: none;
        }

        .modal-btn {
            width: 100%; padding: 14px; margin-top: 15px;
            background: #fff; color: #000; border: none;
            border-radius: 12px; cursor: pointer; font-weight: 600;
            transition: transform 0.2s;
        }

        /* --- INPUT AREA --- */
        .input-area { 
            padding: 20px 15%; 
            display: flex; justify-content: center; align-items: flex-end; 
            gap: 12px; position: relative; 
        }

        .action-box {
            position: absolute; bottom: 100%; 
            background: var(--box-bg); border: 1px solid var(--line);
            border-radius: 16px; width: 220px; display: none;
            z-index: 100; padding: 10px 0; margin-bottom: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .action-box.active { display: block; animation: slideUp 0.3s ease; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .poll-item {
            display: flex; align-items: center; padding: 12px 20px;
            color: #bbb; font-size: 14px; cursor: pointer; gap: 12px;
            transition: all 0.2s;
        }
        .poll-item:hover { background: var(--line); color: #fff; }

        .circle-btn {
            width: 52px; height: 52px;
            background: var(--input-bg);
            border: 1px solid var(--line);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: #ffffff; flex-shrink: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Mic Active State */
        .circle-btn.mic-active { 
            background: #ffffff !important; 
            color: #000000 !important;
            box-shadow: 0 0 20px rgba(255,255,255,0.4);
            transform: scale(1.1);
        }

        .input-wrap { position: relative; width: 100%; display: flex; align-items: flex-end; }

        .input-box {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--line); 
            border-radius: 26px; 
            padding: 15px 55px 15px 22px; 
            color: var(--text);
            outline: none;
            font-size: 16px;
            resize: none;
            max-height: 150px; /* Limits to roughly 5-6 lines */
            overflow-y: hidden; /* Default hidden */
            transition: border 0.3s;
        }
        .input-box:focus { border-color: rgba(255,255,255,0.4); }

        .send-btn {
            position: absolute; right: 18px; bottom: 15px; 
            color: rgba(255,255,255,0.5); font-size: 18px;
            cursor: pointer; transition: color 0.3s;
        }
        .send-btn:hover { color: #fff; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <aside>
        <div class="top-nav">
            <div class="nav-btn icon-btn" onclick="openModal('Search')"><i class="fas fa-search"></i></div>
            <div class="nav-btn icon-btn" onclick="openModal('More Options')"><i class="fas fa-bars"></i></div>
        </div>
        <div class="sidebar-header">
            <div class="nav-btn" onclick="showNamingModal()"><i class="fas fa-plus-circle"></i><span>New Chat</span></div>
            <div class="nav-btn" onclick="openModal('World')"><i class="fas fa-globe"></i><span>World</span></div>
            <div class="nav-btn" onclick="openModal('More')"><i class="fas fa-ellipsis-h"></i><span>...</span></div>
        </div>
        <div class="hanging-label">History</div>
        <div id="history-list"></div>
        <div class="sidebar-footer">
            <div class="nav-btn" onclick="openModal('Settings')"><i class="fas fa-cog"></i><span>Settings</span></div>
        </div>
    </aside>

    <main>
        <div class="profile-trigger" onclick="toggleAuthModal()"><i class="fas fa-user"></i></div>

        <div id="authOverlay" class="modal-overlay">
            <div class="central-poll">
                <i class="fas fa-times" style="float:right; cursor:pointer" onclick="toggleAuthModal()"></i>
                <h2 id="authTitle">Sign In</h2>
                <input type="email" class="modal-input" placeholder="Email Address">
                <input type="password" class="modal-input" placeholder="Password">
                <div id="signUpFields" style="display: none;"><input type="text" class="modal-input" placeholder="Full Name"></div>
                <button class="modal-btn" onclick="toggleAuthModal()">Continue</button>
            </div>
        </div>

        <div id="namingOverlay" class="modal-overlay">
            <div class="central-poll">
                <h2>Name your Chat</h2>
                <input type="text" id="chatNameInput" class="modal-input" placeholder="e.g. Research Session" autofocus>
                <button class="modal-btn" onclick="createNewChat()">Create Chat</button>
            </div>
        </div>

        <div id="modalOverlay" class="modal-overlay">
            <div class="central-poll">
                <i class="fas fa-times" style="float:right; cursor:pointer" onclick="closeModal()"></i>
                <h2 id="modalTitle"></h2>
            </div>
        </div>

        <div id="chat-container"></div>

        <div class="input-area">
            <div id="btn1" class="circle-btn" onclick="toggleBox('box1')">
                <i class="fas fa-plus"></i>
                <div id="box1" class="action-box">
                    <div class="poll-item" onclick="openModal('Attach File')"><i class="fas fa-paperclip"></i> Attach File</div>
                    <div class="poll-item" onclick="openModal('Search Link')"><i class="fas fa-link"></i> Search Link</div>
                </div>
            </div>
            
            <div id="btn2" class="circle-btn" onclick="toggleBox('box2')" style="display: none;"><i class="fas fa-camera"></i><div id="box2" class="action-box"></div></div>
            
            <div id="btn3" class="circle-btn" onclick="startVoiceRecognition()">
                <i class="fas fa-microphone"></i>
            </div>

            <div class="input-wrap">
                <textarea id="userInput" class="input-box" rows="1" oninput="autoExpand(this)" onkeydown="checkEnter(event)" placeholder="Ask me anything..." autofocus></textarea>
                <i id="sendIcon" class="fas fa-paper-plane send-btn" onclick="send()"></i>
            </div>
        </div>
    </main>

    <script>
        let chats = []; let currentChatId = null; let activeBoxId = null; 
        let micTimeout;

        function checkDevice() {
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            document.getElementById('btn2').style.display = isMobile ? 'flex' : 'none';
        }
        window.onload = checkDevice;

        function toggleAuthModal() { document.getElementById('authOverlay').classList.toggle('show'); }
        function showNamingModal() { document.getElementById('namingOverlay').classList.add('show'); document.getElementById('chatNameInput').focus(); }

        function createNewChat() {
            const input = document.getElementById('chatNameInput');
            const name = input.value.trim() || "New Discussion";
            const chat = { id: Date.now(), name, messages: [] };
            chats.unshift(chat); currentChatId = chat.id; input.value = "";
            document.getElementById('namingOverlay').classList.remove('show');
            renderHistory(); renderChat();
        }

        function renderHistory() {
            const list = document.getElementById('history-list'); list.innerHTML = "";
            chats.forEach(c => {
                const item = document.createElement('div');
                item.className = `history-item ${c.id === currentChatId ? 'active' : ''}`;
                item.innerText = c.name;
                item.onclick = () => { currentChatId = c.id; renderHistory(); renderChat(); };
                list.appendChild(item);
            });
        }

        function renderChat() {
            const container = document.getElementById('chat-container'); container.innerHTML = "";
            const current = chats.find(c => c.id === currentChatId); 
            if (!current) return;
            current.messages.forEach(m => {
                const d = document.createElement('div'); d.className = `msg ${m.role}`; d.innerText = m.text;
                container.appendChild(d);
            });
            container.scrollTop = container.scrollHeight;
        }

        /* --- VOICE RECOGNITION LOGIC --- */
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = true;

            recognition.onstart = () => {
                const btn = document.getElementById('btn3');
                btn.classList.add('mic-active');
                clearTimeout(micTimeout);
                // 5 second fallback if no noise is heard
                micTimeout = setTimeout(() => { recognition.stop(); }, 5000);
            };

            recognition.onresult = (e) => {
                clearTimeout(micTimeout);
                const transcript = Array.from(e.results).map(r => r[0].transcript).join('');
                document.getElementById('userInput').value = transcript;
                autoExpand(document.getElementById('userInput'));
                // Reset timeout on noise
                micTimeout = setTimeout(() => { recognition.stop(); }, 5000);
            };

            recognition.onend = () => {
                document.getElementById('btn3').classList.remove('mic-active');
            };
        }

        function startVoiceRecognition() {
            if (!recognition) return;
            try { recognition.start(); } catch(e) { recognition.stop(); }
        }

        function toggleBox(boxId) { 
            const box = document.getElementById(boxId); 
            if (activeBoxId && activeBoxId !== boxId) document.getElementById(activeBoxId).classList.remove('active'); 
            box.classList.toggle('active'); activeBoxId = box.classList.contains('active') ? boxId : null; 
        }

        function autoExpand(t) {
            t.style.height = 'auto';
            const newHeight = t.scrollHeight;
            t.style.height = newHeight + 'px';
            // Enable scrollbar only after ~5 lines (approx 120px)
            t.style.overflowY = newHeight > 140 ? 'auto' : 'hidden';
        }

        function checkEnter(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }

        async function send() {
            const input = document.getElementById('userInput'); const val = input.value.trim(); if (!val) return;
            if (!currentChatId) { 
                const chat = { id: Date.now(), name: val.substring(0, 25), messages: [] }; 
                chats.unshift(chat); currentChatId = chat.id; 
            }
            const current = chats.find(c => c.id === currentChatId);
            current.messages.push({ role: "user", text: val }); renderChat(); renderHistory();
            input.value = ""; input.style.height = 'auto';
            const loadingIdx = current.messages.length; current.messages.push({ role: "ai", text: "..." }); renderChat();
            try {
                const res = await fetch("/api/chat", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ message: val }) });
                const data = await res.json(); 
                current.messages[loadingIdx].text = data.candidates?.[0]?.content?.parts?.[0]?.text || "Response error.";
            } catch (err) { current.messages[loadingIdx].text = "Connection failed."; }
            renderChat();
        }

        function openModal(title) { document.getElementById('modalTitle').innerText = title; document.getElementById('modalOverlay').classList.add('show'); }
        function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }
    </script>
</body>
</html>
