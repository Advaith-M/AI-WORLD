<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> | AI VILE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #000000;
            --line: rgba(255, 255, 255, 0.12); 
            --input-bg: rgba(255, 255, 255, 0.14); 
            --text: #ffffff;
            --accent: rgba(255, 255, 255, 0.2);
            --box-bg: #111111;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            height: 100vh; 
            display: flex; 
            overflow: hidden; 
        }

        aside { 
            width: 253px; 
            border-right: 4.45px solid var(--line); 
            height: 100%;
            transition: width 0.3s ease;
        }

        main { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            height: 100%;
            min-width: 0; 
        }

        header {
            height: 0px;
            border-bottom: 1px solid var(--line);
        }

        #chat-container { 
            flex: 1; 
            overflow-y: auto; 
            padding: 40px; 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
        }

        .msg { 
            max-width: 85%; 
            padding: 15px 20px; 
            border: 1px solid var(--line); 
            font-size: 14px;
            line-height: 1.6;
            color: #fff;
            border-radius: 10px; 
            white-space: pre-wrap;
            word-break: break-all;
            overflow-wrap: anywhere;
        }

        @media (min-width: 768px) {
            .msg { max-width: 65%; }
        }

        .user { 
            align-self: flex-end; 
            border-color: rgba(255, 255, 255, 0.4); 
        }

        .ai { align-self: flex-start; }

        .input-area { 
            padding: 20px; 
            display: flex;
            justify-content: center;
            align-items: flex-end; 
            gap: 10px; 
            position: relative; 
            width: 100%;
        }

        @media (min-width: 1024px) {
            .input-area {
                padding: 46px;
                padding-right: 100px; 
                gap: 12px;
            }
        }

        /* --- UPDATED POLL BOX --- */
        .action-box {
            position: absolute;
            bottom: 120%; 
            background: var(--box-bg);
            border: 1px solid var(--line);
            border-radius: 12px;
            width: 220px;
            display: none;
            z-index: 100;
            box-shadow: 0 8px 25px rgba(0,0,0,0.7);
            overflow: hidden;
            padding: 8px 0;
        }

        /* Specific height for empty boxes to match your previous request */
        #box2, #box3 { height: 150px; }

        .action-box.active {
            display: block;
            animation: fadeIn 0.15s ease-out;
        }

        /* List items inside Plus Poll */
        .poll-item {
            display: flex;
            align-items: center;
            padding: 12px 18px;
            color: #ccc;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
            gap: 12px;
            text-align: left;
        }

        .poll-item:hover {
            background: var(--line);
            color: #fff;
        }

        .poll-item i {
            width: 18px;
            font-size: 14px;
            text-align: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .circle-btn {
            width: 44px; 
            height: 44px;
            background: var(--input-bg);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #ffffff;
            font-size: 16px;
            transition: transform 0.1s cubic-bezier(0.4, 0, 0.2, 1), background 0.32s;
            flex-shrink: 0;
            margin-bottom: 2px;
            position: relative;
        }

        .circle-btn.recording {
            background: rgba(255, 0, 0, 0.3);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        @media (min-width: 1024px) {
            .circle-btn {
                width: 48px; 
                height: 48px;
                font-size: 18px;
            }
        }

        .circle-btn:hover { background: var(--accent); }
        .circle-btn.clicked { transform: scale(0.85); }

        .input-wrap {
            position: relative;
            width: 100%;
            max-width: 800px;
            display: flex;
            align-items: flex-end;
        }

        .input-box {
            width: 100%;
            background: var(--input-bg);
            border: none; 
            border-radius: 25px; 
            padding: 15px 50px 15px 20px; 
            color: var(--text);
            outline: none;
            font-size: 16px;
            transition: background 0.32s ease;
            word-break: break-all;
            resize: none;
            line-height: 1.5; 
            max-height: 160px; 
            overflow-y: auto;
            display: block;
            scrollbar-width: none; 
            -ms-overflow-style: none; 
        }

        @media (min-width: 1024px) {
            .input-box { padding: 18px 60px 18px 25px; }
        }

        .input-box::-webkit-scrollbar { display: none; }

        .send-btn {
            position: absolute;
            right: 15px;
            bottom: 14px; 
            color: #ffffff;
            font-size: 18px;
            cursor: pointer;
            opacity: 1;
            transition: transform 0.1s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.34s;
        }

        @media (min-width: 1024px) {
            .send-btn { right: 22px; bottom: 16px; font-size: 20px; }
        }

        @media (max-width: 768px) {
            aside { width: 0; border: none; overflow: hidden; }
            #chat-container { padding: 20px; }
        }

        #chat-container::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <aside></aside>

    <main>
        <header></header>
        
        <div id="chat-container"></div>

        <div class="input-area">
            <div id="btn1" class="circle-btn" onclick="toggleBox('box1', 'btn1')">
                <i class="fas fa-plus"></i>
                <div id="box1" class="action-box">
                    <div class="poll-item"><i class="fas fa-paperclip"></i> Attach File</div>
                    <div class="poll-item"><i class="fas fa-link"></i> Search Link</div>
                    <div class="poll-item"><i class="fas fa-cog"></i> Settings</div>
                    <div class="poll-item"><i class="fas fa-layer-group"></i> Mode</div>
                    <div class="poll-item"><i class="fas fa-tools"></i> Tools</div>
                </div>
            </div>

            <div id="btn2" class="circle-btn" onclick="toggleBox('box2', 'btn2')">
                <i class="fas fa-camera"></i>
                <div id="box2" class="action-box"></div>
            </div>

            <div id="btn3" class="circle-btn" onclick="startVoiceRecognition('btn3')">
                <i class="fas fa-microphone"></i>
                <div id="box3" class="action-box"></div>
            </div>

            <div class="input-wrap">
                <textarea id="userInput" class="input-box" rows="1" placeholder="" oninput="autoExpand(this)" onkeydown="checkEnter(event)" autofocus></textarea>
                <i id="sendIcon" class="fas fa-paper-plane send-btn" onclick="send()"></i>
            </div>
        </div>
    </main>

    <script>
        const memory = [];
        let activeBoxId = null;

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'en-US';
            recognition.interimResults = true;

            recognition.onresult = (event) => {
                const input = document.getElementById('userInput');
                let transcript = Array.from(event.results)
                    .map(result => result[0])
                    .map(result => result.transcript)
                    .join('');
                
                input.value = transcript;
                autoExpand(input);
            };

            recognition.onend = () => {
                document.getElementById('btn3').classList.remove('recording');
            };
        }

        function startVoiceRecognition(btnId) {
            const btn = document.getElementById(btnId);
            const box = document.getElementById('box3');
            
            if (activeBoxId && activeBoxId !== 'box3') {
                document.getElementById(activeBoxId).classList.remove('active');
            }

            if (!recognition) {
                alert("Voice Recognition not supported in this browser.");
                return;
            }

            btn.classList.add('clicked');
            setTimeout(() => btn.classList.remove('clicked'), 100);

            // Toggle logic for empty box while recording
            if (activeBoxId === 'box3') {
                box.classList.remove('active');
                activeBoxId = null;
                btn.classList.remove('recording');
                recognition.stop();
            } else {
                box.classList.add('active');
                activeBoxId = 'box3';
                btn.classList.add('recording');
                recognition.start();
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            const cameraBtn = document.getElementById('btn2');
            const isMobile = /iPhone|iPad|iPod|Android|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            if (!isMobile) {
                cameraBtn.style.display = 'none';
            }
        });

        function toggleBox(boxId, btnId) {
            const box = document.getElementById(boxId);
            const btn = document.getElementById(btnId);

            btn.classList.add('clicked');
            setTimeout(() => btn.classList.remove('clicked'), 100);

            if (activeBoxId === boxId) {
                box.classList.remove('active');
                activeBoxId = null;
            } else {
                if (activeBoxId) {
                    document.getElementById(activeBoxId).classList.remove('active');
                }
                box.classList.add('active');
                activeBoxId = boxId;
            }
        }

        function autoExpand(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = (textarea.scrollHeight) + 'px';
        }

        function checkEnter(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                send();
            }
        }

        function renderChat() {
            const container = document.getElementById('chat-container');
            container.innerHTML = "";
            memory.forEach(m => {
                const d = document.createElement('div');
                d.className = `msg ${m.role}`;
                d.innerText = m.text;
                container.appendChild(d);
            });
            container.scrollTop = container.scrollHeight;
        }

        async function send() {
            const input = document.getElementById('userInput');
            const icon = document.getElementById('sendIcon');
            const val = input.value.trim();
            if (!val) return;

            icon.classList.add('clicked');
            setTimeout(() => icon.classList.remove('clicked'), 100);

            if (activeBoxId) {
                document.getElementById(activeBoxId).classList.remove('active');
                activeBoxId = null;
                document.getElementById('btn3').classList.remove('recording');
            }

            if (recognition) recognition.stop();

            memory.push({ role: "user", text: val });
            renderChat();
            
            input.value = "";
            input.style.height = 'auto';

            const loadingIdx = memory.length;
            memory.push({ role: "ai", text: "..." });
            renderChat();

            try {
                const res = await fetch("/api/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: val })
                });

                const data = await res.json();
                const responseText = data.candidates?.[0]?.content?.parts?.[0]?.text || "!";
                memory[loadingIdx].text = responseText;
            } catch (err) {
                memory[loadingIdx].text = "?";
            }
            renderChat();
        }
    </script>
</body>
</html>
