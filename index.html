<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI VILE | Professional Intelligence</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #000000;
            --sidebar-bg: #0a0a0a;
            --line: rgba(255, 255, 255, 0.12); 
            --input-bg: rgba(255, 255, 255, 0.14); 
            --text: #ffffff;
            --accent: rgba(255, 255, 255, 0.2);
            --modal-bg: #161616;
            --user-outline: rgba(255, 255, 255, 0.3);
            --ai-outline: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }

        /* --- SIDEBAR --- */
        aside { 
            width: 280px; background: var(--sidebar-bg); border-right: 1px solid var(--line); 
            height: 100%; display: flex; flex-direction: column; 
        }

        .top-nav { padding: 15px 20px; display: flex; gap: 10px; }
        .sidebar-header { padding: 10px 20px; display: flex; flex-direction: column; gap: 10px; }

        .nav-btn {
            width: 100%; padding: 12px; background: var(--input-bg); border: 1px solid var(--line);
            border-radius: 10px; color: white; display: flex; align-items: center; gap: 12px;
            cursor: pointer; font-size: 14px; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .nav-btn:hover { background: var(--accent); }

        .hanging-label {
            padding: 15px 25px 5px 25px; font-size: 11px; font-weight: 700;
            color: rgba(255, 255, 255, 0.3); letter-spacing: 1.5px; text-transform: uppercase;
        }

        #history-list { flex: 1; overflow-y: auto; padding: 5px 10px; scrollbar-width: none; }

        /* --- MAIN HEADER (LOGO AREA) --- */
        .main-header {
            position: absolute; top: 0; left: 0; right: 0; height: 70px;
            padding: 0 30px; display: flex; align-items: center; justify-content: space-between;
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(15px); border-bottom: 1px solid var(--line); z-index: 100;
        }
        .logo-area { display: flex; align-items: center; gap: 12px; }
        .site-name { font-size: 18px; font-weight: 800; letter-spacing: 2px; color: #fff; }
        .profile-trigger {
            width: 40px; height: 40px; background: var(--input-bg); border: 1px solid var(--line);
            border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer;
        }

        /* --- MAIN CHAT AREA --- */
        main { flex: 1; display: flex; flex-direction: column; height: 100%; position: relative; padding-top: 70px; }

        #chat-container { 
            flex: 1; overflow-y: auto; padding: 40px 15%; display: flex; flex-direction: column; gap: 24px; 
            scrollbar-width: thin; scrollbar-color: transparent transparent;
        }

        .msg { 
            max-width: 80%; padding: 16px 20px; font-size: 15px; line-height: 1.6; color: #eee;
            animation: msgEntry 0.4s cubic-bezier(0.16, 1, 0.3, 1); box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        @keyframes msgEntry { from { opacity: 0; transform: translateY(15px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
        .user { align-self: flex-end; background: #1a1a1a; border: 1px solid var(--user-outline); border-radius: 18px 18px 4px 18px; }
        .ai { align-self: flex-start; background: #111; border: 1px solid var(--ai-outline); border-radius: 18px 18px 18px 4px; }

        /* --- INPUT AREA & VOICE BTN --- */
        .input-area { padding: 20px 15%; display: flex; gap: 12px; align-items: flex-end; }
        .circle-btn {
            width: 52px; height: 52px; background: var(--input-bg); border: 1px solid var(--line);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: #fff; flex-shrink: 0; transition: all 0.3s;
        }

        /* High Quality Mic Pulse Animation */
        .mic-active { 
            background: #ffffff !important; color: #000 !important; 
            box-shadow: 0 0 25px rgba(255,255,255,0.6); 
            animation: pulse 1.5s infinite; 
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        .input-wrap { position: relative; width: 100%; display: flex; align-items: flex-end; }
        .input-box {
            width: 100%; background: var(--input-bg); border: 1px solid var(--line); 
            border-radius: 26px; padding: 15px 55px 15px 22px; color: var(--text);
            outline: none; font-size: 16px; resize: none; max-height: 150px; overflow-y: hidden;
        }

        .send-btn { position: absolute; right: 18px; bottom: 15px; color: rgba(255,255,255,0.3); font-size: 18px; cursor: pointer; transition: 0.3s; }
        .send-btn.primed { color: #fff; transform: scale(1.2); text-shadow: 0 0 10px #fff; }

        /* --- MODALS --- */
        .modal-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); display: none; justify-content: center; align-items: center;
            z-index: 1000; backdrop-filter: blur(12px);
        }
        .modal-overlay.show { display: flex; }
        .central-poll { background: var(--modal-bg); width: 90%; max-width: 400px; border-radius: 24px; border: 1px solid var(--line); padding: 40px; text-align: center; }
        .modal-input { width: 100%; padding: 14px; margin: 10px 0; background: #000; border: 1px solid var(--line); border-radius: 12px; color: white; outline: none; }
        .modal-btn { width: 100%; padding: 14px; margin-top: 15px; background: #fff; color: #000; border: none; border-radius: 12px; cursor: pointer; font-weight: 700; }
        .modal-btn.secondary { background: transparent; color: #888; border: 1px solid var(--line); margin-top: 8px; }
    </style>
</head>
<body>

    <aside>
        <div class="top-nav">
            <div class="nav-btn" onclick="openModal('Search')"><i class="fas fa-search"></i></div>
            <div class="nav-btn" onclick="openModal('Menu')"><i class="fas fa-bars"></i></div>
        </div>
        <div class="sidebar-header">
            <div class="nav-btn" onclick="showNamingModal()"><i class="fas fa-plus-circle"></i><span>New Chat</span></div>
        </div>
        <div class="hanging-label">Recent History</div>
        <div id="history-list"></div>
    </aside>

    <main>
        <div class="main-header">
            <div class="logo-area">
                <i class="fas fa-bolt" style="font-size: 24px;"></i>
                <span class="site-name">AI VILE</span>
            </div>
            <div class="profile-trigger" onclick="toggleAuthModal()"><i class="fas fa-user"></i></div>
        </div>

        <div id="namingOverlay" class="modal-overlay">
            <div class="central-poll">
                <h2>New Conversation</h2>
                <input type="text" id="chatNameInput" class="modal-input" placeholder="Enter chat title..." autofocus>
                <button class="modal-btn" onclick="createNewChat()">Create</button>
                <button class="modal-btn secondary" onclick="closeNamingModal()">Cancel</button>
            </div>
        </div>

        <div id="chat-container"></div>

        <div class="input-area">
            <div class="circle-btn" onclick="openModal('Options')"><i class="fas fa-plus"></i></div>
            <div id="voiceBtn" class="circle-btn" onclick="toggleVoice()">
                <i class="fas fa-microphone"></i>
            </div>
            <div class="input-wrap">
                <textarea id="userInput" class="input-box" rows="1" oninput="autoExpand(this)" onkeydown="handleDoubleEnter(event)" placeholder="Double-tap Enter to send..."></textarea>
                <i id="sendIcon" class="fas fa-paper-plane send-btn" onclick="send()"></i>
            </div>
        </div>
    </main>

    <script>
        let chats = []; 
        let currentChatId = null; 
        let lastEnterTime = 0;
        let isListening = false;
        let recognition;

        /* --- VOICE RECOGNITION (BEST QUALITY) --- */
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechAPI = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechAPI();
            recognition.continuous = true;
            recognition.interimResults = true; // Real-time feedback
            recognition.lang = 'en-US';

            recognition.onresult = (event) => {
                let transcript = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    transcript += event.results[i][0].transcript;
                }
                const input = document.getElementById('userInput');
                input.value = transcript;
                autoExpand(input);
            };

            recognition.onend = () => {
                isListening = false;
                document.getElementById('voiceBtn').classList.remove('mic-active');
            };

            recognition.onerror = () => {
                isListening = false;
                document.getElementById('voiceBtn').classList.remove('mic-active');
            };
        }

        function toggleVoice() {
            if (!recognition) return alert("Speech recognition not supported in this browser.");
            if (isListening) {
                recognition.stop();
            } else {
                recognition.start();
                isListening = true;
                document.getElementById('voiceBtn').classList.add('mic-active');
            }
        }

        /* --- DOUBLE ENTER LOGIC --- */
        function handleDoubleEnter(e) {
            const sendIcon = document.getElementById('sendIcon');
            if (e.key === 'Enter' && !e.shiftKey) {
                const now = Date.now();
                if (now - lastEnterTime < 500) {
                    e.preventDefault();
                    send();
                    sendIcon.classList.remove('primed');
                } else {
                    lastEnterTime = now;
                    sendIcon.classList.add('primed');
                    setTimeout(() => { if (Date.now() - lastEnterTime >= 500) sendIcon.classList.remove('primed'); }, 510);
                }
            }
        }

        function autoExpand(t) {
            t.style.height = 'auto';
            t.style.height = t.scrollHeight + 'px';
            t.style.overflowY = t.scrollHeight > 140 ? 'auto' : 'hidden';
        }

        function send() {
            const input = document.getElementById('userInput');
            const val = input.value.trim();
            if (!val) return;

            if (!currentChatId) {
                const chat = { id: Date.now(), name: val.substring(0, 20), messages: [] };
                chats.unshift(chat); currentChatId = chat.id;
            }

            const current = chats.find(c => c.id === currentChatId);
            current.messages.push({ role: "user", text: val });
            renderChat();
            renderHistory();
            
            input.value = "";
            input.style.height = 'auto';

            // Simulate AI
            setTimeout(() => {
                current.messages.push({ role: "ai", text: "Professional high-speed response processed." });
                renderChat();
            }, 600);
        }

        function renderChat() {
            const container = document.getElementById('chat-container');
            container.innerHTML = "";
            const current = chats.find(c => c.id === currentChatId);
            if (!current) return;
            current.messages.forEach(m => {
                const d = document.createElement('div');
                d.className = `msg ${m.role}`;
                d.innerText = m.text;
                container.appendChild(d);
            });
            container.scrollTop = container.scrollHeight;
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            list.innerHTML = "";
            chats.forEach(c => {
                const item = document.createElement('div');
                item.className = `nav-btn ${c.id === currentChatId ? 'active' : ''}`;
                item.style.marginBottom = "5px";
                item.innerText = c.name;
                item.onclick = () => { currentChatId = c.id; renderChat(); renderHistory(); };
                list.appendChild(item);
            });
        }

        function showNamingModal() { document.getElementById('namingOverlay').classList.add('show'); }
        function closeNamingModal() { document.getElementById('namingOverlay').classList.remove('show'); }
        function createNewChat() {
            const name = document.getElementById('chatNameInput').value || "New Chat";
            const chat = { id: Date.now(), name, messages: [] };
            chats.unshift(chat); currentChatId = chat.id;
            closeNamingModal(); renderHistory(); renderChat();
        }
        function openModal(t) { console.log("Opening: " + t); }
    </script>
</body>
</html>
