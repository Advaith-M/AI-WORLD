<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI VILE | Collective Intelligence</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.0/css/all.min.css" crossorigin="anonymous">
    <style>
        :root {
            --bg: #000000;
            --sidebar-bg: #0a0a0a;
            --line: rgba(255, 255, 255, 0.12); 
            --input-bg: rgba(255, 255, 255, 0.14); 
            --text: #ffffff;
            --accent: rgba(255, 255, 255, 0.2);
            --modal-bg: #161616;
            --user-outline: rgba(255, 255, 255, 0.3);
            --ai-outline: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }

        /* --- SIDEBAR --- */
        aside { 
            width: 280px; background: var(--sidebar-bg); border-right: 3.5px solid var(--line); 
            height: 100%; display: flex; flex-direction: column; transition: all 0.3s ease;
        }

        .top-nav { padding: 15px 20px 5px 20px; display: flex; gap: 10px; }
        .sidebar-header { padding: 10px 20px 10px 20px; display: flex; flex-direction: column; gap: 10px; }

        .nav-btn {
            width: 100%; padding: 12px; background: var(--input-bg); border: 2px solid var(--line);
            border-radius: 10px; color: white; display: flex; align-items: center; gap: 12px;
            cursor: pointer; font-size: 14px; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .nav-btn:hover { background: var(--accent); transform: translateY(-1px); }
        .nav-btn:active { transform: scale(0.98); }

        .hanging-label {
            padding: 15px 25px 15px 100px; font-size: 11px; font-weight: 700;
            color: rgba(255, 255, 255, 0.5); letter-spacing: 1.3px; text-transform: uppercase;
        }

        #history-list { flex: 1; overflow-y: auto; padding: 5px 10px; }
        .history-item {
            padding: 13px; margin-bottom: 6.5px; border-radius: 13.45px; cursor: pointer;
            font-size: 12.5px; color: #888; transition: all 0.37s ease;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .history-item:hover { background: rgba(255,255,255,0.03); color: #fff; }
        .history-item.active { background: var(--line); color: #fff; }

        .sidebar-footer { padding: 15px 20px; border-top: 3.45px solid var(--line); }

        /* --- MAIN AREA --- */
        main { flex: 1; display: flex; flex-direction: column; height: 100%; position: relative; }

        #chat-container { 
            flex: 1; overflow-y: auto; padding: 80px 15% 40px 15%; 
            display: flex; flex-direction: column; gap: 24px; scroll-behavior: smooth;
        }

        .msg { 
            max-width: 85%; padding: 16px 20px; font-size: 15px; line-height: 1.6;
            color: #eee; border-radius: 18px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            animation: professionalEntry 0.45s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes professionalEntry {
            0% { opacity: 0; transform: translateY(20px) scale(0.98); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .user { align-self: flex-end; background: #1a1a1a; border: 1px solid var(--user-outline); border-radius: 18px 18px 4px 18px; }
        .ai { align-self: flex-start; background: #111; border: 1px solid var(--ai-outline); border-radius: 18px 18px 18px 4px; }

        /* --- FLOATING POLL (Plus Button Menu) --- */
        .poll-menu {
            position: absolute; bottom: 85px; left: 15%; 
            background: var(--modal-bg); border: 1px solid var(--line);
            border-radius: 15px; padding: 10px; display: none;
            flex-direction: column; gap: 5px; z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .poll-menu.show { display: flex; }
        .poll-item {
            padding: 10px 15px; color: #ccc; cursor: pointer; border-radius: 8px;
            font-size: 13px; display: flex; align-items: center; gap: 10px;
        }
        .poll-item:hover { background: var(--accent); color: #fff; }

        /* --- INPUT AREA --- */
        .input-area { padding: 20px 15%; display: flex; gap: 12px; align-items: flex-end; position: relative; }
        .circle-btn {
            width: 63px; height: 52px; background: var(--input-bg); border: 1.9px solid var(--line);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: #fff; transition: all 0.3s ease;
        }
        .circle-btn:hover { background: var(--accent); }
        .mic-active { background: #fff !important; color: #000 !important; transform: scale(1.1); box-shadow: 0 0 15px #fff; }

        .input-wrap { position: relative; width: 100%; }
        .input-box {
            width: 100%; background: var(--input-bg); border: 2px solid var(--line); 
            border-radius: 20px; padding: 15px 55px 15px 22px; color: var(--text);
            outline: none; font-size: 15px; resize: none; transition: border 0.345s;
        }
        .send-btn {
            position: absolute; right: 17.59px; bottom: 20px; 
            color: rgba(255,255,255,255); font-size: 18px; cursor: pointer; transition: 0.285s;
        }
        .send-btn.primed { color: #fff; transform: scale(1.1); }

        /* MODALS */
        .modal-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.85); display:none; justify-content:center; align-items:center; z-index:1000;
        }
        .modal-overlay.show { display:flex; animation: fadeIn 0.4s ease; }
        .modal-card { background: var(--modal-bg); padding: 40px; border-radius: 24px; border: 1px solid var(--line); width: 350px; text-align: center; }
        @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    </style>
</head>
<body>

    <aside id="sidebar">
        <div class="top-nav">
            <div class="nav-btn" onclick="openGenericModal('Search')"><i class="fas fa-search"></i></div>
            <div class="nav-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></div>
        </div>
        <div class="sidebar-header">
            <div class="nav-btn" onclick="showNamingModal()"><i class="fas fa-plus-circle"></i><span>New Chat</span></div>
            <div class="nav-btn" onclick="openGenericModal('World Feed')"><i class="fas fa-globe"></i><span>World</span></div>
        </div>
        <div class="hanging-label">History</div>
        <div id="history-list"></div>
        <div class="sidebar-footer">
            <div class="nav-btn" onclick="openGenericModal('Settings')"><i class="fas fa-cog"></i><span>Settings</span></div>
        </div>
    </aside>

    <main>
        <div id="chat-container"></div>

        <!-- The Floating Poll Menu -->
        <div id="plusPoll" class="poll-menu">
            <div class="poll-item" onclick="openGenericModal('Upload File')"><i class="fas fa-file-upload"></i> Upload File</div>
            <div class="poll-item" onclick="openGenericModal('Camera')"><i class="fas fa-camera"></i> Capture</div>
            <div class="poll-item" onclick="openGenericModal('Templates')"><i class="fas fa-th-large"></i> Templates</div>
        </div>

        <div class="input-area">
            <div class="circle-btn" onclick="togglePlusMenu()"><i class="fas fa-plus"></i></div>
            <div id="micBtn" class="circle-btn" onclick="startVoice()"><i class="fas fa-microphone"></i></div>
            <div class="input-wrap">
                <textarea id="userInput" class="input-box" rows="1" oninput="autoGrow(this)" onkeydown="handleDoubleEnter(event)" placeholder="Message"></textarea>
                <i id="sendIcon" class="fas fa-paper-plane send-btn" onclick="send()"></i>
            </div>
        </div>
    </main>

    <!-- Modals -->
    <div id="namingModal" class="modal-overlay">
        <div class="modal-card">
            <h2 style="margin-bottom:20px">Naming Session</h2>
            <input type="text" id="chatNameInput" class="input-box" style="border-radius:10px; margin-bottom:20px" placeholder="Topic name...">
            <button class="nav-btn" style="justify-content:center" onclick="createNewChat()">Initiate</button>
        </div>
    </div>

    <div id="genericModal" class="modal-overlay" onclick="closeGenericModal()">
        <div class="modal-card" onclick="event.stopPropagation()">
            <h2 id="modalTitle"></h2>
            <p style="color:#666; margin-top:15px">Feature coming soon in the next Vile update.</p>
        </div>
    </div>

    <script>
        let chats = [];
        let currentChatId = null;
        let lastEnterTime = 0;

        function togglePlusMenu() { document.getElementById('plusPoll').classList.toggle('show'); }
        function showNamingModal() { document.getElementById('namingModal').classList.add('show'); }
        function openGenericModal(title) { document.getElementById('modalTitle').innerText = title; document.getElementById('genericModal').classList.add('show'); }
        function closeGenericModal() { document.getElementById('genericModal').classList.remove('show'); }
        function toggleSidebar() { const s = document.getElementById('sidebar'); s.style.width = s.style.width === '80px' ? '280px' : '80px'; }

        function autoGrow(t) { t.style.height = 'auto'; t.style.height = t.scrollHeight + 'px'; }

        function handleDoubleEnter(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                const now = Date.now();
                if (now - lastEnterTime < 500) {
                    e.preventDefault();
                    send();
                }
                lastEnterTime = now;
                document.getElementById('sendIcon').classList.add('primed');
                setTimeout(() => document.getElementById('sendIcon').classList.remove('primed'), 500);
            }
        }

        function createNewChat() {
            const name = document.getElementById('chatNameInput').value || "Intelligence Brief";
            const chat = { id: Date.now(), name, messages: [] };
            chats.unshift(chat); currentChatId = chat.id;
            document.getElementById('namingModal').classList.remove('show');
            document.getElementById('chatNameInput').value = "";
            renderHistory(); renderChat();
        }

        async function send() {
            const input = document.getElementById('userInput');
            const val = input.value.trim();
            if (!val) return;
            if (!currentChatId) createNewChat();

            const current = chats.find(c => c.id === currentChatId);
            current.messages.push({ role: "user", text: val });
            renderChat();
            input.value = ""; input.style.height = 'auto';

            const loadIdx = current.messages.length;
            current.messages.push({ role: "ai", text: "..." });
            renderChat();

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: val })
                });
                const data = await response.json();
                const result = `**OpenAI**\n${data.gpt}\n\n**Gemini**\n${data.gemini}\n\n**Groq**\n${data.groq}`;
                current.messages[loadIdx].text = result;
            } catch (err) {
                current.messages[loadIdx].text = " - OFFLINE - ";
            }
            renderChat();
            renderHistory();
        }

        function renderChat() {
            const container = document.getElementById('chat-container');
            container.innerHTML = "";
            const current = chats.find(c => c.id === currentChatId);
            if (!current) return;
            current.messages.forEach(m => {
                const d = document.createElement('div');
                d.className = `msg ${m.role}`;
                d.innerHTML = m.text.replace(/\n/g, '<br>');
                container.appendChild(d);
            });
            container.scrollTop = container.scrollHeight;
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            list.innerHTML = "";
            chats.forEach(c => {
                const d = document.createElement('div');
                d.className = `history-item ${c.id === currentChatId ? 'active' : ''}`;
                d.innerText = c.name;
                d.onclick = () => { currentChatId = c.id; renderChat(); renderHistory(); };
                list.appendChild(d);
            });
        }

        function startVoice() {
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!Speech) return;
            const rec = new Speech();
            rec.onstart = () => document.getElementById('micBtn').classList.add('mic-active');
            rec.onresult = (e) => { document.getElementById('userInput').value = e.results[0][0].transcript; autoGrow(document.getElementById('userInput')); };
            rec.onend = () => document.getElementById('micBtn').classList.remove('mic-active');
            rec.start();
        }
    </script>
</body>
</html>
